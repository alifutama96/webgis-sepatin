<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGIS PLUP Sepatin</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #map { flex: 1; width: 100%; z-index: 1; background: #cbd5e1; }
        .legend-swatch { width: 12px; height: 12px; border-radius: 2px; margin-right: 8px; border: 1px solid rgba(0,0,0,0.1); flex-shrink: 0; }
        
        #sidebar { 
            width: 300px; 
            min-width: 200px; 
            max-width: 500px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            background: white;
            z-index: 40;
        }
        #sidebar.collapsed { transform: translateX(-100%); position: absolute; height: 100%; }
        
        #resizer {
            width: 4px;
            cursor: col-resize;
            background: #f1f5f9;
            transition: background 0.2s;
            z-index: 50;
        }
        #resizer:hover { background: #3b82f6; }

        .loader-dots div { width: 4px; height: 4px; background: #3b82f6; border-radius: 50%; animation: bounce 0.5s infinite alternate; }
        .loader-dots div:nth-child(2) { animation-delay: 0.1s; }
        .loader-dots div:nth-child(3) { animation-delay: 0.2s; }
        @keyframes bounce { to { transform: translateY(-3px); opacity: 0.3; } }
    </style>
</head>
<body class="bg-slate-50">

    <nav class="h-14 bg-white border-b border-slate-200 px-4 flex items-center justify-between shadow-sm relative z-50">
        <div class="flex items-center space-x-3">
            <button id="toggle-sidebar" class="p-2 hover:bg-slate-100 rounded-lg text-slate-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
            <div>
                <h1 class="font-bold text-slate-800 text-sm leading-tight">WebGIS Sepatin</h1>
                <p class="text-[9px] uppercase font-bold text-blue-500 tracking-wider">Land Use Analysis</p>
            </div>
        </div>
        
        <div class="flex items-center space-x-3">
            <div id="loading-indicator" class="hidden flex items-center space-x-2 px-3 py-1 bg-slate-100 rounded-full text-[10px] text-slate-500">
                <div class="loader-dots flex space-x-1"><div></div><div></div><div></div></div>
                <span>Memuat Peta...</span>
            </div>
            <button id="ai-analyze" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded-lg text-[11px] font-bold transition-all shadow-sm flex items-center gap-1.5">
                <span>✨ Analisis AI</span>
            </button>
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden relative">
        <aside id="sidebar" class="border-r border-slate-200">
            <div class="flex-1 overflow-y-auto p-4">
                <div class="mb-6">
                    <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Informasi Lahan</h3>
                    <div class="bg-blue-50/50 rounded-xl p-3 border border-blue-100/50">
                        <span class="text-[9px] font-bold text-blue-600 uppercase">Total Area</span>
                        <p id="stat-total-area" class="text-lg font-bold text-slate-800 mt-1">0 <span class="text-xs font-normal">Ha</span></p>
                    </div>
                </div>

                <div class="mb-6">
                    <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Legenda Tutupan Lahan</h3>
                    <div id="legend-container" class="space-y-1"></div>
                </div>

                <div id="ai-response-box" class="hidden mt-4 animate-in slide-in-from-bottom-2">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-[10px] font-bold text-indigo-600 uppercase">Rekomendasi AI</h3>
                        <button onclick="document.getElementById('ai-response-box').classList.add('hidden')" class="text-slate-300 hover:text-slate-500">&times;</button>
                    </div>
                    <div id="ai-text" class="bg-indigo-50 border border-indigo-100 p-3 rounded-lg text-[10px] text-indigo-900 leading-relaxed"></div>
                </div>
            </div>
            
            <div class="p-3 border-t border-slate-100 text-[9px] text-slate-400 text-center">
                Sumber Data: PLUP_sepatin.geojson
            </div>
        </aside>

        <div id="resizer"></div>

        <main class="flex-1 relative">
            <div id="map"></div>
            
            <div class="absolute bottom-6 right-6 z-[1000] flex flex-col gap-2">
                <button onclick="toggleBasemap()" class="p-2.5 bg-white rounded-lg shadow-md border border-slate-200 text-slate-600 hover:bg-slate-50 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                </button>
                <button onclick="resetView()" class="p-2.5 bg-blue-600 rounded-lg shadow-md text-white hover:bg-blue-700 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /></svg>
                </button>
            </div>
        </main>
    </div>

    <script>
        const apiKey = ""; 
        let map, geojsonLayer, currentData;
        let isSatellite = false;

        // Proyeksi UTM Zone 50S ke WGS84
        proj4.defs("EPSG:32750", "+proj=utm +zone=50 +south +datum=WGS84 +units=m +no_defs");

        const colors = {
            'Pemukiman': '#ef4444',
            'Tambak': '#f59e0b',
            'Mangrove': '#059669',
            'Hutan Mangrove Sekunder': '#10b981',
            'Mangrove Terdegradasi': '#84cc16',
            'Vegetasi Pantai': '#14b8a6',
            'Tubuh Air': '#0ea5e9',
            'Sungai': '#3b82f6',
            'Tanah Terbuka': '#94a3b8'
        };

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-0.635, 117.47], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            setupSidebarControls();
            loadGeoData();
        }

        function setupSidebarControls() {
            const sidebar = document.getElementById('sidebar');
            const resizer = document.getElementById('resizer');
            const toggle = document.getElementById('toggle-sidebar');
            let isResizing = false;

            resizer.addEventListener('mousedown', () => { isResizing = true; document.body.style.cursor = 'col-resize'; });
            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                let w = e.clientX;
                if (w >= 200 && w <= 500) sidebar.style.width = w + 'px';
            });
            document.addEventListener('mouseup', () => { 
                if(isResizing) { isResizing = false; document.body.style.cursor = 'default'; map.invalidateSize(); }
            });

            toggle.addEventListener('click', () => {
                sidebar.classList.toggle('collapsed');
                setTimeout(() => map.invalidateSize(), 310);
            });
        }

        async function loadGeoData() {
            const loader = document.getElementById('loading-indicator');
            loader.classList.remove('hidden');

            try {
                // Gunakan URL absolut yang lebih aman untuk lingkungan ini
                const url = window.location.href.split('index.html')[0] + 'PLUP_sepatin.geojson';
                const response = await fetch(url);
                
                if (!response.ok) {
                    // Fallback jika fetch gagal: Coba ambil file secara langsung tanpa ./
                    const fallbackResponse = await fetch('PLUP_sepatin.geojson');
                    if(!fallbackResponse.ok) throw new Error("Gagal memuat file GeoJSON");
                    var data = await fallbackResponse.json();
                } else {
                    var data = await response.json();
                }

                // Cek jika koordinat UTM (> 180 atau < -180)
                const first = getFirst(data.features[0].geometry);
                if (Math.abs(first[0]) > 180) {
                    data = convertData(data);
                }

                currentData = data;
                renderMap(data);
                updateUI(data);

            } catch (err) {
                console.error("Map Load Error:", err);
                alert("File 'PLUP_sepatin.geojson' tidak terbaca. Pastikan file ada di folder yang sama.");
            } finally {
                loader.classList.add('hidden');
            }
        }

        function getFirst(g) {
            if (g.type === 'MultiPolygon') return g.coordinates[0][0][0];
            return g.coordinates[0][0];
        }

        function convertData(json) {
            const out = JSON.parse(JSON.stringify(json));
            out.features.forEach(f => {
                const t = f.geometry.type;
                if (t === 'MultiPolygon') {
                    f.geometry.coordinates = f.geometry.coordinates.map(p => p.map(r => r.map(c => proj4("EPSG:32750", "WGS84", [c[0], c[1]]))));
                } else if (t === 'Polygon') {
                    f.geometry.coordinates = f.geometry.coordinates.map(r => r.map(c => proj4("EPSG:32750", "WGS84", [c[0], c[1]])));
                }
            });
            return out;
        }

        function renderMap(data) {
            if (geojsonLayer) map.removeLayer(geojsonLayer);
            geojsonLayer = L.geoJSON(data, {
                style: (f) => ({
                    fillColor: colors[f.properties.PL_24] || '#94a3b8',
                    weight: 1, color: 'white', fillOpacity: 0.7
                }),
                onEachFeature: (f, l) => {
                    l.bindPopup(`<div class="text-[11px]"><b>${f.properties.PL_24}</b><br>Luas: ${f.properties.Luas_ha?.toFixed(2)} Ha</div>`);
                }
            }).addTo(map);
            map.fitBounds(geojsonLayer.getBounds());
        }

        function updateUI(data) {
            const total = data.features.reduce((acc, f) => acc + (f.properties.Luas_ha || 0), 0);
            document.getElementById('stat-total-area').innerHTML = `${total.toLocaleString('id-ID')} <span class="text-xs font-normal">Ha</span>`;

            const types = [...new Set(data.features.map(f => f.properties.PL_24))].filter(Boolean).sort();
            const container = document.getElementById('legend-container');
            container.innerHTML = '';
            types.forEach(t => {
                const el = document.createElement('div');
                el.className = 'flex items-center text-[10px] text-slate-600 py-1 px-1 hover:bg-slate-50 rounded';
                el.innerHTML = `<div class="legend-swatch" style="background:${colors[t] || '#94a3b8'}"></div><span>${t}</span>`;
                container.appendChild(el);
            });
        }

        document.getElementById('ai-analyze').addEventListener('click', async () => {
            if (!currentData) return;
            const box = document.getElementById('ai-response-box');
            const txt = document.getElementById('ai-text');
            box.classList.remove('hidden');
            txt.innerText = "Menganalisis data lahan...";

            const stats = {};
            currentData.features.forEach(f => {
                const p = f.properties;
                stats[p.PL_24] = (stats[p.PL_24] || 0) + (p.Luas_ha || 0);
            });

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: `Analisis data ini: ${JSON.stringify(stats)}. Berikan 3 poin singkat saran tata ruang dalam Bahasa Indonesia.` }] }]
                    })
                });
                const d = await res.json();
                txt.innerText = d.candidates[0].content.parts[0].text;
            } catch {
                txt.innerText = "Gagal memuat analisis AI.";
            }
        });

        function toggleBasemap() {
            isSatellite = !isSatellite;
            L.tileLayer(isSatellite ? 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}' : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        function resetView() { if (geojsonLayer) map.fitBounds(geojsonLayer.getBounds()); }

        window.onload = initMap;
    </script>
</body>
</html>
