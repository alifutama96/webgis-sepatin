<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGIS PLUP Sepatin - Penutupan Lahan</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        #map { height: calc(100vh - 64px); width: 100%; z-index: 1; background: #f1f5f9; }
        .legend-swatch { width: 16px; height: 16px; border-radius: 4px; margin-right: 10px; border: 1px solid rgba(0,0,0,0.1); flex-shrink: 0; }
        .custom-popup .leaflet-popup-content-wrapper { border-radius: 12px; padding: 5px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        /* FIX BUG 3: Tambah animation-delay supaya dots animasi berurutan */
        .loader-dots div { width: 5px; height: 5px; background: #3b82f6; border-radius: 50%; animation: bounce 0.5s infinite alternate; }
        .loader-dots div:nth-child(2) { animation-delay: 0.15s; }
        .loader-dots div:nth-child(3) { animation-delay: 0.30s; }
        @keyframes bounce { to { transform: translateY(-5px); opacity: 0.3; } }
    </style>
</head>
<body class="bg-slate-50 overflow-hidden">

    <!-- Header Navigation -->
    <nav class="h-16 bg-white border-b border-slate-200 px-6 flex items-center justify-between shadow-sm relative z-50">
        <div class="flex items-center space-x-3">
            <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-100">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
                </svg>
            </div>
            <div>
                <h1 class="font-bold text-slate-800 text-lg leading-tight">WebGIS Sepatin</h1>
                <p class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">Participatory Land Use Planning</p>
            </div>
        </div>
        
        <div class="flex items-center space-x-4">
            <div id="loading-indicator" class="hidden flex items-center space-x-2 px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-xs font-semibold border border-blue-100">
                <div class="loader-dots flex space-x-1"><div></div><div></div><div></div></div>
                <span>Sinkronisasi Data...</span>
            </div>
            <button id="ai-analyze" class="bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-700 hover:to-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all shadow-md flex items-center">
                <span class="mr-2">✨ Analisis AI</span>
            </button>
        </div>
    </nav>

    <div class="flex relative">
        <!-- Sidebar -->
        <aside class="w-80 bg-white border-r border-slate-200 h-[calc(100vh-64px)] overflow-y-auto p-6 z-[40] shadow-sm">
            
            <div class="mb-8">
                <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-4">Statistik Lahan</h3>
                <div class="space-y-3">
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <span class="text-[10px] font-bold text-slate-500 uppercase">Total Luas</span>
                        <p id="stat-total-area" class="text-2xl font-bold text-slate-800 mt-1">0 <span class="text-sm font-normal text-slate-400">Ha</span></p>
                    </div>
                    <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                        <span class="text-[10px] font-bold text-blue-600 uppercase">Desa Fokus</span>
                        <p id="stat-village" class="text-lg font-bold text-blue-900 mt-1">-</p>
                    </div>
                </div>
            </div>

            <div class="mb-8">
                <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-4">Legenda Tutupan Lahan</h3>
                <div id="legend-container" class="space-y-1.5"></div>
            </div>

            <div id="ai-response-box" class="hidden mt-4">
                <div class="flex items-center justify-between mb-2">
                    <h3 class="text-[11px] font-bold text-indigo-600 uppercase tracking-widest">Rekomendasi AI</h3>
                    <button onclick="this.parentElement.parentElement.classList.add('hidden')" class="text-slate-300 hover:text-slate-500 text-lg">&times;</button>
                </div>
                <div id="ai-text" class="bg-indigo-50 border border-indigo-100 p-4 rounded-2xl text-[12px] text-indigo-900 leading-relaxed italic">
                    Memproses data...
                </div>
            </div>
        </aside>

        <!-- Peta -->
        <main class="flex-1 relative">
            <div id="map"></div>
            
            <div class="absolute bottom-6 right-6 z-[1000] flex flex-col space-y-3">
                <button onclick="toggleBasemap()" class="p-3 bg-white/90 backdrop-blur rounded-2xl shadow-xl hover:bg-white transition-all border border-white group" title="Ganti Tampilan Satelit">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-600 group-hover:text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </button>
                <button onclick="resetView()" class="p-3 bg-blue-600 rounded-2xl shadow-xl hover:bg-blue-700 transition-all text-white" title="Pusatkan Peta">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                    </svg>
                </button>
            </div>
        </main>
    </div>

    <script>
        const apiKey = ""; // Isi dengan API Key Gemini kamu
        let map, geojsonLayer, currentData;
        let isSatellite = false;

        proj4.defs("EPSG:32750", "+proj=utm +zone=50 +south +datum=WGS84 +units=m +no_defs");

        const colorMap = {
            'Pemukiman': '#ef4444',
            'Tambak': '#f59e0b',
            'Mangrove': '#059669',
            'Hutan Mangrove Primer': '#064e3b',
            'Hutan Mangrove Sekunder': '#10b981',
            'Tubuh Air': '#06b6d4',
            'Perikanan': '#3b82f6',
            'Rehabilitasi': '#a7f3d0'
        };

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false })
                   .setView([-0.635, 117.47], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            renderLegend();
            loadData();
        }

        function renderLegend() {
            const container = document.getElementById('legend-container');
            Object.entries(colorMap).forEach(([label, color]) => {
                const item = document.createElement('div');
                item.className = 'flex items-center text-xs text-slate-600 py-1 transition-all hover:bg-slate-50 px-2 rounded-lg';
                item.innerHTML = `<div class="legend-swatch" style="background:${color}"></div><span>${label}</span>`;
                container.appendChild(item);
            });
        }

        function projectGeoJSON(json) {
            json.features.forEach(feat => {
                const type = feat.geometry.type;
                if (type === "MultiPolygon") {
                    feat.geometry.coordinates = feat.geometry.coordinates.map(poly =>
                        poly.map(ring => ring.map(c => proj4("EPSG:32750", "WGS84", [c[0], c[1]])))
                    );
                } else if (type === "Polygon") {
                    feat.geometry.coordinates = feat.geometry.coordinates.map(ring =>
                        ring.map(c => proj4("EPSG:32750", "WGS84", [c[0], c[1]]))
                    );
                }
            });
            return json;
        }

        // FIX BUG 1: Helper untuk ambil koordinat pertama dengan benar
        function getFirstCoord(geom) {
            const c = geom.coordinates;
            if (geom.type === 'MultiPolygon') return c[0][0][0];
            if (geom.type === 'Polygon')      return c[0][0];
            return c[0];
        }

        async function loadData() {
            const loader = document.getElementById('loading-indicator');
            loader.classList.remove('hidden');

            try {
                const response = await fetch('PLUP_sepatin.geojson');
                // FIX BUG 1: Throw error dengan pesan jelas jika file tidak ditemukan
                if (!response.ok) throw new Error(`HTTP ${response.status} — file tidak ditemukan`);

                let data = await response.json();

                // FIX BUG 1: Cek koordinat dengan benar menggunakan helper
                const firstCoord = getFirstCoord(data.features[0].geometry);
                if (Math.abs(firstCoord[0]) > 1000) {
                    console.log("Koordinat UTM terdeteksi. Mengonversi ke WGS84...");
                    data = projectGeoJSON(data);
                }

                currentData = data;

                geojsonLayer = L.geoJSON(data, {
                    style: (f) => ({
                        fillColor: colorMap[f.properties.PL_24] || '#94a3b8',
                        weight: 0.5,
                        opacity: 1,
                        color: 'white',
                        fillOpacity: 0.7
                    }),
                    onEachFeature: (f, l) => {
                        const p = f.properties;
                        l.bindPopup(`
                            <div class="custom-popup">
                                <h4 class="font-bold text-slate-800 border-b pb-1 mb-2">${p.PL_24 || 'Tanpa Nama'}</h4>
                                <div class="text-[11px] space-y-1">
                                    <p class="text-slate-500 uppercase font-bold tracking-tighter">Luas Wilayah</p>
                                    <p class="text-slate-800 text-sm font-bold">${p.Luas_ha?.toFixed(3)} Ha</p>
                                    <p class="text-slate-500 uppercase font-bold tracking-tighter mt-2">Keterangan</p>
                                    <p class="text-slate-800">${p.Desa || '-'}</p>
                                </div>
                            </div>
                        `);
                        // FIX BUG 4: Peta otomatis flyTo ke fitur yang diklik
                        l.on('click', function(e) {
                            map.flyTo(e.latlng, 15, { duration: 0.8 });
                        });
                    }
                }).addTo(map);

                map.fitBounds(geojsonLayer.getBounds());
                updateUIStats(data);

            } catch (err) {
                console.error("Detail error:", err);
                // FIX BUG 1: Pesan error lebih informatif, termasuk hint CORS
                alert(
                    `Gagal memuat file GeoJSON.\n\n` +
                    `Kemungkinan penyebab:\n` +
                    `• File "PLUP_sepatin.geojson" tidak ada di folder yang sama\n` +
                    `• Kamu membuka file langsung (file://) — harus lewat server lokal\n\n` +
                    `Solusi: jalankan di terminal:\n` +
                    `  python -m http.server 8000\n` +
                    `lalu buka http://localhost:8000\n\n` +
                    `Error: ${err.message}`
                );
            } finally {
                loader.classList.add('hidden');
            }
        }

        function updateUIStats(data) {
            const total = data.features.reduce((sum, f) => sum + (f.properties.Luas_ha || 0), 0);
            document.getElementById('stat-total-area').innerHTML = `${total.toLocaleString('id-ID', {maximumFractionDigits: 2})} <span class="text-sm font-normal text-slate-400">Ha</span>`;
            document.getElementById('stat-village').innerText = data.features[0]?.properties.Desa || "Sepatin";
        }

        // FIX BUG 2: Gunakan model Gemini yang valid
        document.getElementById('ai-analyze').addEventListener('click', async () => {
            if (!currentData) return;

            const box = document.getElementById('ai-response-box');
            const txt = document.getElementById('ai-text');
            box.classList.remove('hidden');
            txt.innerHTML = 'Menganalisis keseimbangan ekosistem...';

            const summary = currentData.features.slice(0, 15).map(f => ({
                t: f.properties.PL_24,
                l: f.properties.Luas_ha
            }));

            const prompt = `Analisis data tata ruang Desa Sepatin ini: ${JSON.stringify(summary)}. 
            Berikan 3 poin penting dalam bahasa Indonesia:
            1. Kondisi dominan wilayah.
            2. Potensi ekonomi (tambak/mangrove).
            3. Saran perlindungan lingkungan.`;

            try {
                // FIX BUG 2: Model gemini-1.5-flash yang valid
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    }
                );
                const res = await response.json();
                if (res.error) throw new Error(res.error.message);
                txt.innerText = res.candidates[0].content.parts[0].text;
            } catch (e) {
                txt.innerText = `Gagal menghubungi asisten AI: ${e.message}`;
            }
        });

        function toggleBasemap() {
            if (!isSatellite) {
                L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
            } else {
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            }
            isSatellite = !isSatellite;
        }

        function resetView() {
            if (geojsonLayer) map.fitBounds(geojsonLayer.getBounds());
        }

        window.onload = initMap;
    </script>
</body>
</html>
